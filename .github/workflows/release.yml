name: Release

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Linux amd64
        run: |
          GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w \
              -X abstrax/internal/version.Version=$(git describe --tags --always --dirty) \
              -X abstrax/internal/version.Commit=$(git rev-parse --short HEAD) \
              -X abstrax/internal/version.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o dist/abstrax-linux-amd64 ./cmd/abstrax

      - name: Build Linux arm64
        run: |
          GOOS=linux GOARCH=arm64 go build \
            -ldflags="-s -w \
              -X abstrax/internal/version.Version=$(git describe --tags --always --dirty) \
              -X abstrax/internal/version.Commit=$(git rev-parse --short HEAD) \
              -X abstrax/internal/version.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o dist/abstrax-linux-arm64 ./cmd/abstrax

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: abstrax-binaries
          path: dist/

  release:
    name: Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
